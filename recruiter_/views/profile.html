<!DOCTYPE html>
<html>
<head>
  <title>Edit Recruiter Profile</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="header">
    <h1><i class="fas fa-user-edit"></i> Edit Recruiter Profile</h1>
    <a href="../index.php" style="color:#00d4ff;">← Back to Dashboard</a>
  </div>
  <div class="card" style="max-width:700px;">
    <h3>Complete Your Agency Profile</h3>
    <form method="POST" enctype="multipart/form-data">
      <div class="form-group">
        <label>Agency Name</label>
        <input type="text" name="agencyname" required>
      </div>
      <div class="form-group">
        <label>Specialization</label>
        <input type="text" name="specialization">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea name="description" rows="4"></textarea>
      </div>
      <div class="form-group">
        <label>Website</label>
        <input type="url" name="website">
      </div>
      <button type="submit" name="update_profile" style="width:250px;font-size:18px;padding:18px;">Save Profile</button>
    </form>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
